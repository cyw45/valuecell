services:
  backend:
    container_name: valuecell-backend
    build:
      context: .
      dockerfile: docker/DockerFile
      args:
        UV_DEFAULT_INDEX: ${UV_DEFAULT_INDEX:-https://pypi.tuna.tsinghua.edu.cn/simple}
    image: valuecell-local-backend:latest
    env_file:
      - ./docker/runtime/.env
    environment:
      API_HOST: 0.0.0.0
      API_PORT: 8000
      PYTHONIOENCODING: utf-8
      VALUECELL_QUANT_ONLY_MODE: "true"
    command: ["python", "-m", "valuecell.server.main"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:${VALUECELL_BACKEND_PORT:-18000}:8000"
    restart: unless-stopped

  frontend:
    container_name: valuecell-frontend
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      args:
        VITE_API_BASE_URL: /api/v1
    image: valuecell-local-frontend:latest
    depends_on:
      - backend
    ports:
      - "127.0.0.1:${VALUECELL_FRONTEND_PORT:-18080}:80"
    restart: unless-stopped
