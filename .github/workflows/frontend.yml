name: Frontend Checks

permissions:
  contents: read

on:
  push:
    branches: ["main"]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend.yml"
  pull_request:
    branches: ["*"]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend.yml"

jobs:
  biome:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Biome
        uses: biomejs/setup-biome@v2
        with:
          version: latest

      - name: Run Biome checks on changed frontend source
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          if ! git -C "$GITHUB_WORKSPACE" cat-file -e "${BASE_SHA}^{commit}" 2>/dev/null; then
            BASE_SHA="HEAD^"
          fi
          mapfile -d '' files < <(
            git -C "$GITHUB_WORKSPACE" diff --name-only --diff-filter=ACMR -z "$BASE_SHA" HEAD -- frontend/src \
              | sed -z 's#^frontend/##'
          )
          if ((${#files[@]})); then
            biome ci --diagnostic-level=error "${files[@]}"
          else
            echo "No changed frontend source files to check."
          fi

  typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: "./frontend/package.json"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run type checking
        run: bun run typecheck

      - name: Run frontend tests
        run: bun test

  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: "./frontend/package.json"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build project
        run: bun run build

      # - name: Upload build artifacts
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: build
      #     path: frontend/build/
      #     retention-days: 7
